# sandbox.yaml -- Research Assistant, minimal viable policy
sandbox:
  name: research-assistant
  lifetime: jit
  identity:
    type: unprivileged
    user: openshell-researcher

filesystem:
  landlock:
    read:
      - /opt/prompts/**
    write:
      - /var/log/research/${task_id}/
    deny_default: true

network:
  egress:
    allow:
      - docs.example.com
      - blog.example.com
    deny_default: true

inference:
  router:
    allow:
      - claude-on-prem://nim-endpoint
    deny_default: true

audit:
  log_levels: [input, retrieval, reasoning, output]
  sink: file:///var/log/research/audit.jsonl
  immutable: true

approval_gates:
  - on: url_selection
    require: human_approval
    timeout: 5m
