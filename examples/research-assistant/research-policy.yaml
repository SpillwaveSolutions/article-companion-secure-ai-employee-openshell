# research-policy.yaml -- Research Assistant, minimal viable policy
version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /opt/prompts
    - /usr
    - /lib
  read_write:
    - /var/log/research
    - /tmp

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  docs:
    name: "Approved research sources"
    endpoints:
      - host: docs.example.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: blog.example.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - path: /usr/bin/python3
