# research-policy.yaml -- Competitive Research Assistant
version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /etc
  read_write:
    - /tmp

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  pypi:
    name: "PyPI package installation"
    endpoints:
      - host: pypi.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
      - host: files.pythonhosted.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - path: /usr/local/bin/uv
      - path: /sandbox/.uv/python/**/python3*
      - path: /sandbox/.venv/bin/python*

  target_company:
    name: "Target company website"
    endpoints:
      - host: spillwave.ai
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - path: /sandbox/.uv/python/**/python3*
      - path: /sandbox/.venv/bin/python*

  google_search:
    name: "Google search via Serper API"
    endpoints:
      - host: google.serper.dev
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - path: /sandbox/.uv/python/**/python3*
      - path: /sandbox/.venv/bin/python*
