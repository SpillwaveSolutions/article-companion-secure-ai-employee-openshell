# onboarding-policy.yaml -- Onboarding Executor sandbox policy
version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /opt/onboarding-templates
    - /usr
    - /lib
    - /etc
  read_write:
    - /var/log/onboarding
    - /tmp

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

# Binary paths use globs because uv's Python path includes the patch
# version (e.g. cpython-3.13.12) which changes across installs.
network_policies:
  identity_provider:
    name: "Identity Provider API"
    endpoints:
      - host: api.identityprovider.example.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: /sandbox/.uv/python/**/python3*
      - path: /sandbox/.venv/bin/python*

  microsoft_graph:
    name: "Microsoft Graph"
    endpoints:
      - host: graph.microsoft.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: /sandbox/.uv/python/**/python3*
      - path: /sandbox/.venv/bin/python*

  calendar:
    name: "Calendar API"
    endpoints:
      - host: api.calendar.example.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow:
              method: POST
              path: /v1/events
    binaries:
      - path: /sandbox/.uv/python/**/python3*
      - path: /sandbox/.venv/bin/python*

  slack:
    name: "Slack Webhooks"
    endpoints:
      - host: hooks.slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow:
              method: POST
              path: /services/**
    binaries:
      - path: /sandbox/.uv/python/**/python3*
      - path: /sandbox/.venv/bin/python*
