# manifest.yaml -- Onboarding Executor sub-agent, full policy
sandbox:
  name: alex-onboarding-executor
  lifetime: jit          # spawn for task, destroy on completion
  identity:
    type: unprivileged
    user: openshell-onboarding

filesystem:
  landlock:
    read:
      - /opt/onboarding-templates/**
    write:
      - /var/log/onboarding/${task_id}/
    deny_default: true

network:
  egress:
    allow:
      - api.identityprovider.example.com
      - graph.microsoft.com
      - api.calendar.example.com
      - hooks.slack.com
    deny_default: true
    hot_reload: true

process:
  seccomp_profile: openshell-default-strict
  forbid:
    - ptrace
    - exec_setuid
    - kmod_load

inference:
  router:
    allow:
      - ollama/nemotron:7b
      - openai/claude-sonnet@https://nim.internal:8080/v1
    deny_default: true

credentials:
  providers:
    - name: identity-provider-token
      scope: ["users.create", "groups.assign"]
      ttl: 4h
    - name: calendar-token
      scope: ["events.create"]
      ttl: 4h

audit:
  log_levels:
    - input
    - retrieval
    - reasoning
    - output
  sink: append-only://siem.example.com/openshell-audit
  immutable: true

approval_gates:
  - on: account_creation
    require: human_approval
    timeout: 30m
