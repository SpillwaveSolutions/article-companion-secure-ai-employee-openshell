# policy.yaml -- one read path, one write path, deny everything else
version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /opt/templates
    - /usr
    - /lib
  read_write:
    - /var/log/demo
    - /tmp

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies: {}
