# Extending the seccomp profile for a tool that needs io_uring
process:
  seccomp_profile: openshell-default-strict
  forbid:
    - ptrace
    - exec_setuid
    - kmod_load
  # Add only the specific syscalls your tool needs.
  # Pre-audit the tool; don't extend reactively.
  allow_additional:
    - io_uring_setup
    - io_uring_enter
    - io_uring_register
