# Seccomp is applied automatically by the OpenShell supervisor.
# The user does not directly configure seccomp in the policy YAML.
#
# What the user controls is the process identity:
#
#   process:
#     run_as_user: sandbox
#     run_as_group: sandbox
#
# The supervisor's default seccomp profile allows syscalls a typical
# Python or Node agent needs (read, write, openat, mmap, futex, the
# network family, the time family) and denies everything else.
#
# Exotic syscalls that an agent has no business making are blocked:
#   ptrace, kexec_load, bpf, init_module, cgroup-manipulation calls
#
# If your agent loads a tool that needs an unusual syscall, check
# the OpenShell docs for the current extension mechanism.
