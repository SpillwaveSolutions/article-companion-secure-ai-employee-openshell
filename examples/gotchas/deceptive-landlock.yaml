# This looks safe. It isn't.
# BAD: overly broad write path
filesystem_bad:
  landlock:
    write:
      - /var/log/**          # Grants write to EVERYTHING under /var/log,
                              # including symlinks that resolve outside /var/log.
                              # If /var/log/app -> /etc/app/config, the agent
                              # can write to /etc/app/config through the link.
    deny_default: true

# GOOD: scoped to one task directory
filesystem_good:
  landlock:
    write:
      - /var/log/onboarding/${task_id}/   # Scoped to one task directory.
    deny_default: true                     # No symlink surprises.
